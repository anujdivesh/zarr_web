version: '3.8'

services:
  nextjs-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zarr-web-nextjs
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BASE_PATH=/zarr-web
      # Add any other environment variables needed (e.g., Zarr S3 URLs)
    restart: unless-stopped
    networks:
      - webnet

networks:
  webnet:
    driver: bridge